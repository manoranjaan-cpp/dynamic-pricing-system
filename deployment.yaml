apiVersion: apps/v1
kind: Deployment
metadata:
  name: fare-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fare-app
  template:
    metadata:
      labels:
        app: fare-app
    spec:
      containers:
      - name: fare-app
        image: YOUR_DOCKER_USERNAME/fare-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: fare-app-service
spec:
  type: NodePort
  selector:
    app: fare-app
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30009